name: Smart Nudge (Every 30 min)

# 매 30분마다 실행하여 사용자별 설정 시간에 맞춰 푸시 알림 전송
# Edge Function에서 현재 KST 시간 슬롯(HH:00 또는 HH:30)과 매칭

on:
  schedule:
    - cron: '0,30 * * * *'   # 매 30분 (매시 :00, :30 UTC)
  workflow_dispatch:  # 수동 실행 가능

jobs:
  send-batch-nudge:
    runs-on: self-hosted

    steps:
      - name: Send Smart Nudge to All Users
        run: |
          echo "🚀 Triggering batch smart nudge..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/send-batch-nudge" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "📊 Response (HTTP $HTTP_CODE):"
          echo "$BODY" | jq . || echo "$BODY"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Batch nudge completed successfully!"
          else
            echo "❌ Batch nudge failed with HTTP $HTTP_CODE"
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
